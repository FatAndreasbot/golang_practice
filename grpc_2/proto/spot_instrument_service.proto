syntax = "proto3";

package proto.spot_instrument;

import "user_service.proto";

option go_package = "proto/spot_instrument";

service SpotInstrumentService {
  rpc ViewMarkets(ViewMarketsRequest) returns (ViewMarketsResponse);
}

message ViewMarketsRequest {
  proto.user_service.UserRole user_role = 1;
}

message ViewMarketsResponse{
  message Market{
    string market_uuid = 1;
    string market_name = 2;
  }
  repeated Market markets = 1;
}
