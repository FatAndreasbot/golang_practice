syntax = "proto3";

package proto.user_service;

import "google/protobuf/empty.proto";

option go_package = "proto/user_service";

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_ADMIN = 1;
  USER_ROLE_BROKER = 2;
  USER_ROLE_USER = 3;
}

service UserService{
  rpc GetUserRole (google.protobuf.Empty) returns (UserRoleResponse);
  rpc LogIn (LogInCredentials) returns (JWTToken);
}

message UserRoleResponse {
  UserRole user_role = 1;
}

message LogInCredentials {
  string username = 1;
  string password = 2;
}

message JWTToken{
  string token = 1;
}